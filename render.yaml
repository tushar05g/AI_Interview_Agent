# Render Blueprint for AI Interview Orchestrator
# This defines a high-performance, low-memory API service.

services:
  # 1. Orchestrator Service (FastAPI)
  - type: web
    name: ai-interview-orchestrator
    runtime: docker
    dockerFilePath: Dockerfile.render
    plan: free # Can now run on FREE tier (512MB RAM)
    region: ohio
    envVars:
      - key: PORT
        value: 7860
      - key: ENV
        value: production
      - key: ENV_MODE
        value: orchestrator
      - key: USE_MODAL
        value: "true"
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-interview-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: ai-interview-db
          property: connectionString
      # --- REQUIRED SECRETS (Fill in Render Dashboard) ---
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_STARTTLS
        sync: false
      - key: JWT_SECRET
        generateValue: true

# 2. Managed Database (PostgreSQL)
databases:
  - name: ai-interview-db
    plan: free

# 3. Managed Redis
redis:
  - name: ai-interview-redis
    plan: free
