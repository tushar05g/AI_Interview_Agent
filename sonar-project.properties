sonar.projectKey=AI_Interview_Platform
sonar.host.url=http://localhost:9000

# Project metadata
sonar.projectName=AI Interview Platform
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/bower_components/**,**/vendor/**,**/venv/**,**/__pycache__/**,**/.git/**,**/migrations/**,**/tmp/**,**/logs/**,**/models/speechbrain/**,**/*.ckpt,**/*.pkl,**/*.bin

# Python configuration
sonar.python.version=3.9
sonar.python.file.suffixes=.py

# Test configuration
sonar.tests=tests
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Duplication configuration
sonar.cpd.exclusions=**/migrations/**,**/tests/**,**/tmp/**
